<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>a question for you 🌹</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      transition: background 1s ease;
    }

    body.pink-mode {
      background: #ffb6c1;
    }

    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 2.5rem;
    }

    #question {
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
      transition: color 0.5s;
    }

    body.pink-mode #question {
      color: #7b2d42;
    }

    #buttons {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s, font-size 0.4s, padding 0.4s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    #yes-btn {
      background: #ff69b4;
      color: #fff;
      font-size: 20px;
      padding: 14px 36px;
    }

    #no-btn {
      background: #333;
      color: #aaa;
      font-size: 16px;
      padding: 10px 24px;
    }

    #success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #heart {
      font-size: 80px;
      animation: pulse 0.8s infinite alternate;
    }

    #success-text {
      font-size: 42px;
      font-weight: 700;
      color: #7b2d42;
    }

    #success-sub {
      font-size: 20px;
      color: #a0495e;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="container">
    <p id="question">will you go on a date with me? 🌹👀👀</p>

    <div id="buttons">
      <button class="btn" id="yes-btn" onclick="sayYes()">yes</button>
      <button class="btn" id="no-btn" onclick="sayNo()">no</button>
    </div>

    <div id="success">
      <div id="heart">💖</div>
      <p id="success-text">frick yes!!</p>
      <p id="success-sub">i can't wait 🥹</p>
    </div>
  </div>

  <script>
    let noCount = 0;

    const noMessages = [
      "are you sure doe👀",
      "are you REALLY sure ill kill you👀",
      "pleaseee reconsider dud 🙏",
      "okay but like... are you sure sure?",
      "the yes button is looking real good rn 👀",
      "last chance!! 😭",
      "no means yes ",
      "just press yes already omg"
      "you gone have to call the cops.."
    ];

    function sayNo() {
      noCount++;

      const question = document.getElementById('question');
      const yesBtn = document.getElementById('yes-btn');
      const noBtn = document.getElementById('no-btn');

      question.textContent = noMessages[Math.min(noCount - 1, noMessages.length - 1)];

      const newYesSize = Math.min(20 + noCount * 8, 64);
      const newYesPadX = Math.min(36 + noCount * 10, 100);
      const newYesPadY = Math.min(14 + noCount * 4, 32);
      yesBtn.style.fontSize = newYesSize + 'px';
      yesBtn.style.padding = newYesPadY + 'px ' + newYesPadX + 'px';

      const newNoSize = Math.max(16 - noCount * 2, 8);
      noBtn.style.fontSize = newNoSize + 'px';
      noBtn.style.padding = '6px 12px';
    }

    function sayYes() {
      document.body.classList.add('pink-mode');
      document.getElementById('question').style.display = 'none';
      document.getElementById('buttons').style.display = 'none';
      const success = document.getElementById('success');
      success.style.display = 'flex';
    }
  </script>
</body>
</html>
